<body class="bg-background text-text-primary font-body-md h-screen flex flex-col antialiased">
<!-- Top App Bar (Suppressed for transactional screen, but keeping a simple back button) -->
<header class="flex items-center px-gutter h-16 w-full fixed top-0 z-50 bg-background/80 backdrop-blur-xl">
<button aria-label="חזור" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-text-primary" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-gutter pt-24 pb-32 max-w-[430px] mx-auto w-full">
<!-- Header Text -->
<div class="mb-section-gap text-right">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-text-primary mb-stack-sm">אימות מספר טלפון</h1>
<p class="font-body-md text-body-md text-text-secondary">
                שלחנו קוד ל-<span class="font-label-mono text-label-mono text-primary" dir="ltr">05X-XXXXXXX</span>
</p>
</div>
<!-- OTP Input Slots -->
<div class="flex justify-between w-full mb-section-gap" dir="ltr">
<input aria-label="ספרה 1" class="otp-input bg-surface-1 border border-border-light text-text-primary font-price-lg" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="ספרה 2" class="otp-input bg-surface-1 border border-border-light text-text-primary font-price-lg" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="ספרה 3" class="otp-input bg-surface-1 border border-border-light text-text-primary font-price-lg" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
<input aria-label="ספרה 4" class="otp-input bg-surface-1 border border-border-light text-text-primary font-price-lg" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text"/>
</div>
<!-- Resend Action -->
<div class="text-center mt-stack-md">
<button class="font-body-md text-body-md text-primary hover:opacity-80 transition-opacity">שלח שוב</button>
</div>
</main>
<!-- Sticky Bottom Container -->
<div class="fixed bottom-0 w-full px-gutter pb-gutter pt-stack-md bg-background/90 backdrop-blur-xl border-t border-border-light z-40 max-w-[430px] left-1/2 -translate-x-1/2">
<button class="w-full h-14 bg-text-primary text-background font-headline-sm text-headline-sm rounded-xl flex items-center justify-center hover:opacity-90 transition-opacity active:scale-95">
            אמת והמשך
        </button>
</div>
<script>
        // Simple OTP auto-focus logic
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
        // Initial focus
        if(inputs.length > 0) inputs[0].focus();
    </script>
