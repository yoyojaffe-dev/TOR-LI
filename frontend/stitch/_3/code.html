        .toggle-label {
            width: 3rem;

            border-radius: 9999px;

            cursor: pointer;
            transition: all 0.3s;

            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 1.25rem;
            height: 1.25rem;
            background-color: white;
            border-radius: 50%;
