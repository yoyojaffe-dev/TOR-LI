<body class="min-h-screen flex flex-col items-center justify-center p-gutter relative overflow-hidden antialiased">
<!-- Ambient Background Lighting -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[80vw] h-[442px] bg-primary/5 blur-[120px] rounded-full"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-[430px] flex flex-col h-full relative z-10 flex-grow py-section-gap">
<!-- Header -->
<header class="text-center mb-section-gap pt-stack-lg">
<h1 class="font-display-lg text-display-lg text-text-primary mb-stack-sm">מי אתה?</h1>
<p class="font-body-md text-body-md text-text-secondary">בחר את סוג המשתמש כדי להתחיל</p>
</header>
<!-- Selection Grid -->
<div class="flex flex-col gap-stack-lg flex-grow justify-center">
<!-- Option 1: Client -->
<button class="role-card w-full rounded-xl p-stack-lg border flex flex-col items-center text-center gap-stack-md group" data-role="client">
<div class="icon-container w-16 h-16 rounded-full bg-surface-container flex items-center justify-center transition-colors duration-300 group-hover:bg-surface-container-highest text-text-muted">
<span class="material-symbols-outlined text-[32px]">content_cut</span>
</div>
<div>
<h2 class="font-headline-sm text-headline-sm text-text-primary mb-base transition-colors duration-300">אני לקוח</h2>
<p class="font-body-md text-body-md text-text-secondary">חיפוש והזמנת תורים למספרות</p>
</div>
</button>
<!-- Option 2: Barber -->
<button class="role-card w-full rounded-xl p-stack-lg border flex flex-col items-center text-center gap-stack-md group" data-role="barber">
<div class="icon-container w-16 h-16 rounded-full bg-surface-container flex items-center justify-center transition-colors duration-300 group-hover:bg-surface-container-highest text-text-muted">
<span class="material-symbols-outlined text-[32px]">calendar_month</span>
</div>
<div>
<h2 class="font-headline-sm text-headline-sm text-text-primary mb-base transition-colors duration-300">אני ספר / בעל עסק</h2>
<p class="font-body-md text-body-md text-text-secondary">ניהול יומן, לקוחות והעסק שלי</p>
</div>
</button>
</div>
<!-- Sticky Bottom Action -->
<div class="mt-section-gap pb-safe w-full">
<button class="w-full bg-surface-container text-text-muted font-headline-sm text-headline-sm py-4 rounded-lg transition-all duration-300 cursor-not-allowed opacity-50 border border-border-light" disabled="" id="continue-btn">
                המשך
            </button>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.role-card');
            const continueBtn = document.getElementById('continue-btn');
            let selectedRole = null;

            cards.forEach(card => {
                card.addEventListener('click', () => {
                    // Remove selected state from all
                    cards.forEach(c => c.classList.remove('selected'));
                    
                    // Add selected state to clicked
                    card.classList.add('selected');
                    selectedRole = card.dataset.role;

                    // Enable continue button and style it
                    continueBtn.disabled = false;
                    continueBtn.classList.remove('bg-surface-container', 'text-text-muted', 'cursor-not-allowed', 'opacity-50');
                    continueBtn.classList.add('bg-text-primary', 'text-background', 'hover:opacity-90', 'cursor-pointer');
                    
                    // Add subtle scale animation to button to draw attention
                    continueBtn.style.transform = 'scale(0.98)';
                    setTimeout(() => {
                        continueBtn.style.transform = 'scale(1)';
                    }, 150);
                });
            });

            continueBtn.addEventListener('click', () => {
                if(selectedRole) {
                    // Logic to proceed based on role
                    console.log('Proceeding as:', selectedRole);
                    // Add transition out effect
                    document.body.style.opacity = '0';
                    document.body.style.transition = 'opacity 0.5s ease';
                }
            });
        });
    </script>
