<body class="bg-background text-text-primary min-h-screen flex flex-col font-body-md antialiased selection:bg-primary selection:text-on-primary">
<!-- Top Navigation / Progress Indicator -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-border-light h-16 flex items-center justify-between px-gutter">
<div class="flex items-center gap-stack-sm text-text-secondary hover:text-text-primary transition-colors cursor-pointer" onclick="history.back()">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;FILL&quot; 0;">arrow_forward</span>
<span class="font-body-md text-body-md">חזור</span>
</div>
<div class="font-display-lg text-display-lg text-primary tracking-tighter">Tor-LI</div>
<div class="w-20"></div> <!-- Spacer for flex centering -->
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-gutter pt-24 pb-32 max-w-md mx-auto w-full">
<!-- Onboarding Header -->
<div class="mb-section-gap flex flex-col items-center text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg mb-stack-sm">פרטי העסק שלך</h1>
<p class="font-body-md text-body-md text-text-secondary">בואו נתחיל לבנות את הפרופיל של המספרה שלכם כדי שלקוחות יוכלו למצוא אתכם בקלות.</p>
</div>
<!-- Progress Bar -->
<div class="w-full mb-section-gap">
<div class="flex justify-between items-center mb-stack-sm font-label-mono text-label-mono text-text-secondary">
<span class="">שלב 1 מתוך 3</span>
<span class="">33%</span>
</div>
<div class="h-2 bg-surface-container-highest rounded-full overflow-hidden w-full relative">
<div class="h-full bg-primary rounded-full drop-shadow-[0_0_8px_rgba(239,178,0,0.5)] transition-all duration-500 ease-out" style="width: 33%;"></div>
</div>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-stack-lg" onsubmit="event.preventDefault();">
<!-- Salon Name -->
<div class="flex flex-col gap-stack-sm">
<label class="font-body-md text-body-md text-text-primary flex items-center gap-base" for="salon-name">
                    שם העסק
                    <span class="text-error">*</span>
</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary" style="font-variation-settings: &quot;FILL&quot; 0;">storefront</span>
<input class="w-full bg-surface-1 border border-border-light rounded-[16px] py-4 pr-12 pl-4 text-text-primary placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors font-body-md text-body-md" id="salon-name" name="salon-name" placeholder="הכנס את שם המספרה" required="" type="text">
</div>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-stack-sm">
<label class="font-body-md text-body-md text-text-primary flex items-center gap-base" for="phone">
                    טלפון
                    <span class="text-error">*</span>
</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary" style="font-variation-settings: &quot;FILL&quot; 0;">call</span>
<input class="w-full bg-surface-1 border border-border-light rounded-[16px] py-4 pr-12 pl-4 text-text-primary placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors font-body-md text-body-md text-right" dir="ltr" id="phone" name="phone" placeholder="050-0000000" required="" type="tel">
</div>
</div>
<!-- Address & Map Preview -->
<div class="flex flex-col gap-stack-sm">
<label class="font-body-md text-body-md text-text-primary flex items-center gap-base" for="address">
                    כתובת העסק
                    <span class="text-error">*</span>
</label>
<div class="relative mb-stack-sm">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary" style="font-variation-settings: &quot;FILL&quot; 0;">location_on</span>
<input class="w-full bg-surface-1 border border-border-light rounded-[16px] py-4 pr-12 pl-4 text-text-primary placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors font-body-md text-body-md" id="address" name="address" placeholder="הכנס רחוב, מספר עיר" required="" type="text">
</div>
<!-- Map Preview Container (Glassmorphism styling) -->
<div class="w-full h-32 rounded-[16px] bg-surface-2 border border-border-light overflow-hidden relative group cursor-pointer">
<img alt="Map Preview" class="w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity duration-300" data-location="Tel Aviv" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBbwsWySIv2H2Tx76_FjTtqqHhYPKW7g0TmYbdb-FAR7VJlRKjiIw4Pau69MbjFlIXzKfkvzTb8Ny2o0QA83153bFCg8CIYjIS14WNlbJFfgb6qd8kBB9475QT1wTdqJusC35_E2AO3_wb9QNBc_a3bVU5-AfVkxeWXBzvVlphuCQVvVbfbGBTwGsuCWCTqsgiyZE6VU-9NsRlZptLFviwx4I1PqEdZxoW3EHkk76QkeiTOQWXgGcuseRWicmVgkxUd8YU5dGkolDj-">
<div class="absolute inset-0 flex items-center justify-center bg-background/20 backdrop-blur-[2px]">
<div class="w-10 h-10 rounded-full bg-surface/80 border border-border-light backdrop-blur-md flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: &quot;FILL&quot; 1;">my_location</span>
</div>
</div>
</div>
</div>
<!-- Instagram -->
<div class="flex flex-col gap-stack-sm">
<label class="font-body-md text-body-md text-text-primary flex items-center gap-base" for="instagram">
                    אינסטגרם
                    <span class="text-text-secondary text-sm">(אופציונלי)</span>
</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary" style="font-variation-settings: &quot;FILL&quot; 0;">alternate_email</span>
<input class="w-full bg-surface-1 border border-border-light rounded-[16px] py-4 pr-12 pl-4 text-text-primary placeholder:text-text-secondary focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors font-body-md text-body-md text-right" dir="ltr" id="instagram" name="instagram" placeholder="username@" type="text">
</div>
</div>
</form>
</main>
<!-- Bottom Action Area (Sticky) -->
<div class="fixed bottom-0 w-full z-50 bg-surface/80 backdrop-blur-2xl border-t border-border-light p-gutter pb-safe">
<button class="w-full max-w-md mx-auto block bg-text-primary text-background font-headline-sm text-headline-sm py-4 rounded-xl hover:bg-surface-2 hover:text-primary transition-colors duration-300 shadow-[0_4px_14px_0_rgba(255,255,255,0.1)] active:scale-[0.98]" type="button">
            המשך
        </button>
</div>


</body></html>
