<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar (Modified for transactional flow) -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl border-b border-white/5 flex flex-row-reverse justify-between items-center px-gutter h-16 w-full">
<button aria-label="חזור" class="text-on-surface-variant hover:opacity-80 transition-opacity" onclick="history.back()" type="button">
<span class="material-symbols-outlined text-[24px]">arrow_forward</span>
</button>
<div class="text-headline-md font-headline-md text-primary">Tor-LI</div>
<div class="w-6 h-6"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-[100px] px-gutter flex flex-col max-w-md mx-auto w-full">
<div class="mb-section-gap animate-[fadeIn_0.5s_ease-out]">
<h1 class="font-display-lg text-display-lg text-text-primary mb-stack-sm">נעים להכיר</h1>
<p class="font-body-md text-body-md text-text-secondary">הזן את הפרטים שלך כדי להצטרף לקהילה ולהתחיל להזמין תורים בקלות.</p>
</div>
<form class="flex flex-col gap-stack-lg flex-grow" onsubmit="event.preventDefault();">
<!-- Full Name Field -->
<div class="flex flex-col gap-base group">
<label class="font-label-mono text-label-mono text-on-surface-variant group-focus-within:text-primary transition-colors" for="fullName">שם מלא</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-muted group-focus-within:text-primary transition-colors z-10 pointer-events-none">person</span>
<input class="w-full h-14 bg-surface-1 border border-border-light rounded-[16px] pr-12 pl-4 font-body-md text-body-md text-text-primary placeholder:text-text-muted focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all surface-1" id="fullName" name="fullName" placeholder="ישראל ישראלי" required="" type="text">
</div>
</div>
<!-- Phone Number Field -->
<div class="flex flex-col gap-base group">
<label class="font-label-mono text-label-mono text-on-surface-variant group-focus-within:text-primary transition-colors" for="phone">מספר טלפון</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-muted group-focus-within:text-primary transition-colors z-10 pointer-events-none">phone_iphone</span>
<input class="w-full h-14 bg-surface-1 border border-border-light rounded-[16px] pr-12 pl-4 text-right font-body-md text-body-md text-text-primary placeholder:text-text-muted focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all" dir="ltr" id="phone" name="phone" placeholder="050-0000000" required="" type="tel">
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-base group">
<label class="font-label-mono text-label-mono text-on-surface-variant group-focus-within:text-primary transition-colors" for="email">אימייל</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-muted group-focus-within:text-primary transition-colors z-10 pointer-events-none">mail</span>
<input class="w-full h-14 bg-surface-1 border border-border-light rounded-[16px] pr-12 pl-4 text-right font-body-md text-body-md text-text-primary placeholder:text-text-muted focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all" dir="ltr" id="email" name="email" placeholder="israel@example.com" required="" type="email">
</div>
</div>
<div class="flex-grow"></div> <!-- Pushes terms down if needed -->
<!-- Terms and Conditions Checkbox -->
<div class="flex items-start gap-stack-sm mt-stack-md">
<div class="flex items-center h-6">
<input class="w-5 h-5 rounded-[4px] bg-surface-1 border-border-light text-primary focus:ring-primary focus:ring-offset-background focus:ring-2 transition-all cursor-pointer" id="terms" name="terms" required="" type="checkbox">
</div>
<label class="font-body-md text-body-md text-text-secondary cursor-pointer pt-[2px]" for="terms">
                    אני מסכים/ה ל<a class="text-primary hover:underline underline-offset-4 decoration-primary/50 transition-all" href="#">תנאי השימוש</a> ול<a class="text-primary hover:underline underline-offset-4 decoration-primary/50 transition-all" href="#">מדיניות הפרטיות</a>.
                </label>
</div>
</form>
</main>
<!-- Sticky Bottom Action (White Button for High Emphasis) -->
<div class="fixed bottom-0 w-full z-40 pb-safe pt-stack-md px-gutter bg-background/90 backdrop-blur-2xl border-t border-border-light flex justify-center h-24">
<button class="w-full max-w-md h-14 bg-text-primary text-background rounded-full font-headline-sm text-headline-sm flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)]" type="submit">
            צור חשבון
            <span class="material-symbols-outlined" style="font-variation-settings: &quot;wght&quot; 700;">arrow_back</span>
</button>
</div>
<script>
        // Simple micro-interaction for input fields to add a slight glow when focused
        const inputs = document.querySelectorAll('input[type="text"], input[type="tel"], input[type="email"]');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('drop-shadow-[0_0_12px_rgba(239,178,0,0.1)]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('drop-shadow-[0_0_12px_rgba(239,178,0,0.1)]');
            });
        });
    </script>
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>


</body></html>
