<body class="min-h-screen flex flex-col items-center justify-start md:justify-center overflow-x-hidden relative" style="background-color: rgb(9, 9, 11);">

<span class="material-symbols-outlined text-on-surface text-xl">arrow_forward</span>

</header>
<!-- Main Content Container -->
<main class="w-full max-w-md px-gutter pt-24 pb-safe flex-1 flex flex-col justify-start md:pt-12">
<!-- Header Text -->

            </p>
</div>
<!-- OTP Input Form -->
<form class="flex flex-col gap-stack-lg" onsubmit="event.preventDefault(); window.location.href='#';">
<!-- Code Inputs -->
<div class="flex flex-row-reverse justify-between gap-3 w-full" dir="ltr">
<input autofocus="" class="otp-input w-16 h-20 bg-surface-1 border border-border-light rounded-xl font-display-lg text-display-lg text-text-primary text-center transition-all duration-200" maxlength="1" pattern="\d*" placeholder="-" type="number" style="background-color: rgb(16, 16, 18); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08);">
<input class="otp-input w-16 h-20 bg-surface-1 border border-border-light rounded-xl font-display-lg text-display-lg text-text-primary text-center transition-all duration-200" maxlength="1" pattern="\d*" placeholder="-" type="number" style="background-color: rgb(16, 16, 18); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08);">
<input class="otp-input w-16 h-20 bg-surface-1 border border-border-light rounded-xl font-display-lg text-display-lg text-text-primary text-center transition-all duration-200" maxlength="1" pattern="\d*" placeholder="-" type="number" style="background-color: rgb(16, 16, 18); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08);">
<input class="otp-input w-16 h-20 bg-surface-1 border border-border-light rounded-xl font-display-lg text-display-lg text-text-primary text-center transition-all duration-200" maxlength="1" pattern="\d*" placeholder="-" type="number" style="background-color: rgb(16, 16, 18); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08);">

</p>
<button class="font-body-md text-body-md text-primary transition-opacity hover:opacity-80 underline text-[#EFB200]" id="resend-btn" type="button">
                    שלח שוב
                </button>
</div>

            </button>

</main>
<script>
        // OTP Input Auto-advance logic
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', function() {
                if (this.value.length > 1) {
                    this.value = this.value.slice(0, 1);
                }
                if (this.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !this.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Simple Countdown Timer
        let timeLeft = 45;
        const timerElement = document.getElementById('timer');
        const resendBtn = document.getElementById('resend-btn');
        const countdownText = document.getElementById('countdown-text');

        const countdown = setInterval(() => {
            timeLeft--;
            const formattedTime = `00:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
            timerElement.textContent = formattedTime;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                countdownText.classList.add('hidden');
                resendBtn.disabled = false;
                resendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                resendBtn.classList.add('hover:opacity-80', 'underline');
            }
        }, 1000);
    </script>
