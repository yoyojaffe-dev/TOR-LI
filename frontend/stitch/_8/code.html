<body class="bg-background text-text-primary antialiased font-body-md custom-scrollbar pb-32 max-w-[430px] mx-auto md:max-w-md shadow-2xl min-h-screen relative">
<!-- TopAppBar Semantic Shell: Transactional intent => Back button only, suppress BottomNavBar -->

<button aria-label="חזור" class="w-8 h-8 flex items-center justify-center text-text-primary hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</header>
<main class="pt-24 px-gutter flex flex-col gap-section-gap">
<!-- Order Summary Card -->
<section class="bg-surface-1 rounded-xl p-stack-md border border-border-light shadow-lg">
<h2 class="text-label-mono font-label-mono text-text-muted mb-stack-sm">סיכום הזמנה</h2>
<div class="flex items-center gap-stack-sm mb-stack-md pb-stack-md border-b border-border-light">

<div>
<p class="text-body-lg font-body-lg text-text-primary">רון ברק</p>
<p class="text-body-md font-body-md text-text-muted">The Grooming Lounge</p>
</div>
</div>
<div class="space-y-stack-sm mb-stack-md">
<div class="flex justify-between items-center">
<span class="text-body-md font-body-md text-text-muted">שירות</span>
<span class="text-body-md font-body-md text-text-primary">תספורת + זקן</span>
</div>
<div class="flex justify-between items-center">
<span class="text-body-md font-body-md text-text-muted">תאריך ושעה</span>
<span class="text-body-md font-body-md text-text-primary">12 במאי, 14:30</span>
</div>
</div>
<div class="flex justify-between items-center pt-stack-sm border-t border-border-light">
<span class="text-body-lg font-body-lg text-text-primary">סה"כ</span>
<span class="text-price-lg font-price-lg text-primary drop-shadow-[0_0_8px_rgba(239,178,0,0.3)]">₪150</span>
</div>
</section>
<!-- Payment Methods -->
<section>
<h2 class="text-label-mono font-label-mono text-text-muted mb-stack-sm">אמצעי תשלום</h2>
<div class="space-y-stack-sm">
<!-- Apple Pay -->
<label class="block relative cursor-pointer group">
<input checked="" class="payment-radio sr-only" name="payment_method" type="radio" value="apple_pay"/>
<div class="bg-surface-2 border border-border-light rounded-lg p-stack-md flex items-center gap-stack-md transition-all duration-200">
<div class="w-10 h-6 bg-white rounded flex items-center justify-center">
<span class="material-symbols-outlined text-black" style="font-variation-settings: 'FILL' 1;">apps</span>
</div>
<span class="text-body-md font-body-md text-text-primary flex-1">Apple Pay</span>
<div class="check-icon w-6 h-6 rounded-full bg-primary flex items-center justify-center opacity-0 scale-50 transition-all duration-300">
<span class="material-symbols-outlined text-black text-sm">check</span>
</div>
</div>
</label>
<!-- Credit Card -->

<input class="payment-radio sr-only" name="payment_method" type="radio" value="credit_card"/>

</div>

<div class="check-icon w-6 h-6 rounded-full bg-primary flex items-center justify-center opacity-0 scale-50 transition-all duration-300">

</div>
</div>
</label>
</div>
</section>

<div>

</div>
</section>

<div class="flex items-center justify-center gap-2 text-text-muted opacity-60 pb-section-gap">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="text-label-mono font-label-mono">תשלום מאובטח · מוצפן SSL</span>
</div>

<label class="flex items-center gap-stack-sm mb-stack-md cursor-pointer group">
<input checked="" class="w-5 h-5 rounded border-border-light bg-surface-3 text-primary focus:ring-primary focus:ring-offset-background transition-colors" type="checkbox"/>
<span class="text-label-mono font-label-mono text-text-muted group-hover:text-text-primary transition-colors">אני מסכים/ה ל<a class="text-primary underline decoration-primary/30 underline-offset-2" href="#">תנאי השימוש</a> ולמדיניות הביטולים.</span>
</label>
<button class="w-full bg-text-primary text-black h-14 rounded-xl text-body-lg font-body-lg font-bold hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex justify-center items-center gap-2 shadow-[0_0_20px_rgba(255,255,255,0.1)]">
