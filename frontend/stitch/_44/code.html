<style>
        .role-card-active {
            border-color: #ffd174;
            box-shadow: 0 0 15px rgba(239, 178, 0, 0.15);
            background-color: #131214;
        }
        .role-card-active .icon-container {
            color: #ffd174;
        }
        .role-card-active .title-text {
            color: #ffd174;
        }
    </style>

<body class="bg-background text-text-primary min-h-screen flex flex-col items-center justify-center font-body-md overflow-x-hidden selection:bg-primary/30 selection:text-primary">
<div class="w-full max-w-[430px] min-h-screen flex flex-col relative bg-background mx-auto">
<!-- Top App Bar (Suppressing global nav shell for onboarding) -->
<header class="fixed top-0 w-full max-w-[430px] z-50 flex justify-between items-center px-gutter h-16 bg-surface/80 backdrop-blur-xl border-b border-border-light">
<h1 class="font-display-lg text-display-lg text-primary tracking-tighter">Tor-LI</h1>
<button aria-label="Back" class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95">
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col px-gutter pt-[104px] pb-safe z-10 relative">
<div class="flex flex-col gap-stack-sm mb-section-gap">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-text-primary">ברוכים הבאים ל-Tor</h2>
<p class="font-body-lg text-body-lg text-text-secondary">אנא בחרו את סוג המשתמש שלכם כדי שנוכל להתאים את החוויה עבורכם.</p>
</div>
<!-- Role Selection Cards -->
<div class="flex flex-col gap-stack-md flex-grow">
<!-- Client Card -->
<label class="cursor-pointer group relative block h-full">
<input checked="" class="peer sr-only" name="role_selection" type="radio" value="client">
<div class="role-card h-full flex items-center p-stack-md rounded-xl border border-border-light bg-surface-1 transition-all duration-300 peer-checked:role-card-active hover:bg-surface-2">
<div class="flex items-center gap-stack-md w-full">
<div class="icon-container flex-shrink-0 w-16 h-16 rounded-full bg-surface-3 flex items-center justify-center text-text-secondary transition-colors duration-300">
<span class="material-symbols-outlined text-[32px]" data-icon="content_cut">content_cut</span>
</div>
<div class="flex flex-col">
<span class="title-text font-headline-sm text-headline-sm text-text-primary transition-colors duration-300 mb-1">אני לקוח</span>
<span class="font-body-md text-body-md text-text-secondary">חיפוש והזמנת תורים למספרות</span>
</div>
</div>
<!-- Radio Indicator (Visual) -->
<div class="absolute top-4 left-4 w-6 h-6 rounded-full border-2 border-border-light flex items-center justify-center opacity-0 peer-checked:opacity-100 peer-checked:border-primary transition-all duration-300">
<div class="w-3 h-3 rounded-full bg-primary scale-0 peer-checked:scale-100 transition-transform duration-300 delay-100"></div>
</div>
</div>
</label>
<!-- Barber Card -->
<label class="cursor-pointer group relative block h-full">
<input class="peer sr-only" name="role_selection" type="radio" value="barber">
<div class="role-card h-full flex items-center p-stack-md rounded-xl border border-border-light bg-surface-1 transition-all duration-300 peer-checked:role-card-active hover:bg-surface-2">
<div class="flex items-center gap-stack-md w-full">
<div class="icon-container flex-shrink-0 w-16 h-16 rounded-full bg-surface-3 flex items-center justify-center text-text-secondary transition-colors duration-300">
<span class="material-symbols-outlined text-[32px]" data-icon="calendar_month">calendar_month</span>
</div>
<div class="flex flex-col">
<span class="title-text font-headline-sm text-headline-sm text-text-primary transition-colors duration-300 mb-1">אני ספר / בעל עסק</span>
<span class="font-body-md text-body-md text-text-secondary">ניהול יומן, לקוחות והעסק שלי</span>
</div>
</div>
<!-- Radio Indicator (Visual) -->
<div class="absolute top-4 left-4 w-6 h-6 rounded-full border-2 border-border-light flex items-center justify-center opacity-0 peer-checked:opacity-100 peer-checked:border-primary transition-all duration-300">
<div class="w-3 h-3 rounded-full bg-primary scale-0 peer-checked:scale-100 transition-transform duration-300 delay-100"></div>
</div>
</div>
</label>
</div>
<!-- Bottom CTA -->
<div class="mt-section-gap pb-8">

</div>
</main>
<!-- Decorative Background Elements -->
<div class="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-[100px] -z-10 pointer-events-none"></div>
<div class="absolute bottom-0 left-0 w-96 h-96 bg-primary/5 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
</div>
