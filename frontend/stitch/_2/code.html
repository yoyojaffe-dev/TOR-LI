<body class="antialiased min-h-screen flex flex-col items-center justify-start pb-[100px] bg-background selection:bg-primary selection:text-on-primary">
<!-- Top App Bar (From Shared Components) -->
<header class="bg-surface dark:bg-surface text-primary dark:text-primary font-headline-sm text-headline-sm fixed top-0 w-full bg-surface-container-low border-b border-border-light transition-all duration-200 active:scale-95 flex items-center justify-between px-5 h-16 z-50">
<div class="flex items-center gap-4 w-full">
<button aria-label="Back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_forward</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-text-primary text-center flex-1 pr-10">הגדרת עסק - שלב 4</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-[430px] pt-24 px-gutter flex flex-col gap-section-gap">
<!-- Header Section -->
<section class="flex flex-col gap-stack-sm text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-1 border border-border-light mx-auto mb-2 text-primary">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-text-primary">פרטי תשלום</h2>
<p class="font-body-md text-body-md text-text-muted px-4">
                הכנס את פרטי חשבון הבנק אליו יועברו התשלומים בגין השירותים. כל התשלומים מאובטחים.
            </p>
</section>
<!-- Progress Indicator (Step 4 of 4) -->
<div class="flex items-center justify-between gap-2 px-4 mb-4">
<div class="h-1.5 flex-1 bg-surface-3 rounded-full overflow-hidden">
<div class="h-full bg-surface-variant rounded-full w-full"></div>
</div>
<div class="h-1.5 flex-1 bg-surface-3 rounded-full overflow-hidden">
<div class="h-full bg-surface-variant rounded-full w-full"></div>
</div>
<div class="h-1.5 flex-1 bg-surface-3 rounded-full overflow-hidden">
<div class="h-full bg-surface-variant rounded-full w-full"></div>
</div>
<div class="h-1.5 flex-1 bg-surface-3 rounded-full overflow-hidden relative">
<div class="h-full bg-primary rounded-full w-full absolute inset-0 gold-glow"></div>
</div>
</div>
<!-- Form Section -->
<section class="bg-surface-1 border border-border-light rounded-xl p-stack-md flex flex-col gap-stack-lg shadow-sm">
<!-- Bank Selection -->
<div class="flex flex-col gap-stack-sm">
<label class="font-body-md text-body-md text-text-secondary" for="bank-name">שם הבנק</label>
<div class="relative input-glow rounded-xl transition-shadow duration-200">
<div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-text-muted">
<span class="material-symbols-outlined text-[20px]">account_balance_wallet</span>
</div>
<select class="w-full bg-surface-2 border border-border-light rounded-xl py-3 pl-4 pr-12 font-body-md text-body-md text-text-primary appearance-none focus:outline-none focus:ring-0 focus:border-transparent transition-colors" id="bank-name">
<option disabled="" selected="" value="">בחר בנק...</option>
<option value="leumi">לאומי (10)</option>
<option value="hapoalim">הפועלים (12)</option>
<option value="discount">דיסקונט (11)</option>
<option value="mizrahi">מזרחי טפחות (20)</option>
<option value="fibi">הבינלאומי (31)</option>
</select>
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-text-muted">
<span class="material-symbols-outlined text-[20px]">expand_more</span>
</div>
</div>
</div>
<!-- Branch & Account Row -->
<div class="flex gap-gutter w-full">
<!-- Branch Number -->
<div class="flex flex-col gap-stack-sm w-1/3">
<label class="font-body-md text-body-md text-text-secondary" for="branch-number">מספר סניף</label>
<div class="relative input-glow rounded-xl transition-shadow duration-200">
<input class="w-full bg-surface-2 border border-border-light rounded-xl py-3 px-4 font-label-mono text-label-mono text-text-primary focus:outline-none focus:ring-0 focus:border-transparent transition-colors text-left dir-ltr" dir="ltr" id="branch-number" placeholder="000" type="number"/>
</div>
</div>
<!-- Account Number -->
<div class="flex flex-col gap-stack-sm w-2/3">
<label class="font-body-md text-body-md text-text-secondary" for="account-number">מספר חשבון</label>
<div class="relative input-glow rounded-xl transition-shadow duration-200">
<input class="w-full bg-surface-2 border border-border-light rounded-xl py-3 px-4 font-label-mono text-label-mono text-text-primary focus:outline-none focus:ring-0 focus:border-transparent transition-colors text-left dir-ltr" dir="ltr" id="account-number" placeholder="00000000" type="number"/>
</div>
</div>
</div>
<!-- Security Reassurance -->
<div class="flex items-start gap-3 mt-2 bg-surface-2 p-3 rounded-lg border border-border-light/50">
<span class="material-symbols-outlined text-success text-[20px] shrink-0 mt-0.5">lock</span>
<p class="font-body-md text-[14px] leading-snug text-text-muted">
                    הפרטים מועברים בצורה מוצפנת ומאובטחת. הם ישמשו אך ורק להעברת התשלומים השוטפים מהלקוחות.
                </p>
</div>
</section>
</main>

<div class="fixed bottom-0 w-full max-w-[430px] mx-auto glass-panel p-gutter pb-[calc(20px+env(safe-area-inset-bottom))] z-40">
<button class="w-full bg-text-primary text-on-secondary-fixed font-headline-sm text-headline-sm py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-surface-variant hover:text-text-primary transition-all duration-300 active:scale-95 shadow-lg group">
<span>סיום והפעלת עסק</span>
<span class="material-symbols-outlined text-[20px] transition-transform group-hover:-translate-x-1">check_circle</span>
</button>
