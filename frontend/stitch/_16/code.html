        const getFilteredAppointments = () => {
            const dayApps = state.appointments[state.selectedDay] || [];
            if (state.selectedStaff === 'all') return dayApps;
            return dayApps.filter(app => app.type === 'break' || app.barber === state.selectedStaff);
        };

        const renderAppointments = () => {
            const container = document.getElementById('appointmentsList');
            const apps = getFilteredAppointments();
            
            // Re-add vertical line
            let html = `<div class="absolute right-[45px] top-4 bottom-4 w-px bg-border-light z-0"></div>`;
            
            if (apps.length === 0) {
                html += `<div class="text-center text-text-muted py-8 relative z-10 font-body-md">אין תורים ליום זה</div>`;
            } else {
                html += apps.map(app => {
                    if (app.type === 'break') {
                        return `
                            <div class="flex items-center gap-4 relative z-10 w-full my-2 opacity-80">
                                <div class="w-[50px] text-right flex-shrink-0">
                                    <span class="font-label-mono text-sm text-text-muted">${app.time}</span>
                                </div>
                                <div class="w-2 h-2 rounded-full bg-surface-bright mt-0 shrink-0 relative right-[5px]"></div>
                                <div class="flex-1 bg-surface-3 rounded-full py-3 px-6 flex justify-center items-center gap-2 border border-border-light">
                                    <span class="material-symbols-outlined text-text-muted text-sm">coffee</span>
                                    <span class="font-body-md text-text-muted text-sm">${app.title} · ${app.duration}min</span>
                                </div>
                            </div>`;
                    }
                    
                    return `
                        <div class="flex items-start gap-4 relative z-10 w-full group cursor-pointer">
                            <div class="w-[50px] pt-4 text-right flex-shrink-0">
                                <span class="font-label-mono text-sm text-text-muted">${app.time}</span>
                            </div>
                            <div class="w-${app.indicator ? '3' : '2'} h-${app.indicator ? '3' : '2'} rounded-full ${app.nodeColor} mt-${app.indicator ? '4' : '5'} shrink-0 relative right-[${app.indicator ? '3' : '5'}px] ${app.ring || ''}"></div>
                            <div class="flex-1 bg-surface-2 border ${app.borderColor} ${app.gradient || ''} rounded-xl p-4 shadow-[0_4px_20px_rgba(0,0,0,0.2)] transition-transform group-active:scale-[0.98] relative overflow-hidden">
                                <div class="flex justify-between items-start mb-2">
                                    <h3 class="font-headline-sm text-on-surface text-lg">${app.service}</h3>
                                    <span class="px-2 py-1 rounded bg-${app.tint.replace('text-', '')}/10 text-${app.tint} text-xs font-bold tracking-wide">${app.statusText}</span>
                                </div>
                                <div class="flex items-center gap-2 text-text-muted font-label-mono text-sm mb-2">
                                    <span>${app.time}</span>
                                    <span class="w-1 h-1 rounded-full bg-border-light"></span>
                                    <span>₪${app.price}</span>
                                    <span class="w-1 h-1 rounded-full bg-border-light"></span>
                                    <span>${app.duration}min</span>
                                </div>
                                <div class="text-text-muted font-label-mono text-xs opacity-70">${app.phone}</div>
                                ${app.indicator ? `<div class="absolute left-0 top-0 bottom-0 w-1 bg-info"></div>` : ''}
                            </div>
                        </div>`;
                }).join('');
            }
            container.innerHTML = html;
        };

        const renderSummary = () => {
            const apps = getFilteredAppointments();
            const actualApps = apps.filter(a => a.type === 'appointment');
            const totalApps = actualApps.length;
            const completed = actualApps.filter(a => a.status === 'completed').length;
            const revenue = actualApps.reduce((sum, a) => sum + (a.price || 0), 0);

            const container = document.getElementById('summaryTiles');
            container.innerHTML = `
                <div class="bg-surface-1 rounded-xl p-4 flex flex-col items-center justify-center border border-border-light shadow-sm">
                    <span class="font-label-mono text-headline-sm text-on-surface mb-1">${totalApps}</span>
                    <span class="font-body-md text-xs text-text-muted">תורים</span>
                </div>
                <div class="bg-surface-1 rounded-xl p-4 flex flex-col items-center justify-center border border-border-light shadow-sm">
                    <span class="font-label-mono text-headline-sm text-on-surface mb-1">${completed}</span>
                    <span class="font-body-md text-xs text-text-muted">הושלמו</span>
                </div>
                <div class="bg-surface-1 rounded-xl p-4 flex flex-col items-center justify-center border border-border-light shadow-sm">
                    <span class="font-price-lg text-headline-sm text-primary mb-1">₪${revenue}</span>
                    <span class="font-body-md text-xs text-text-muted">הכנסות</span>
                </div>`;
        };

        const updateUI = () => {
            renderStaffFilter();
            renderDayPicker();
            renderSummary();
            renderAppointments();
        };

        // Expose functions
        window.selectStaff = (id) => {
            state.selectedStaff = id;
            updateUI();
        };

        window.selectDay = (id) => {
            state.selectedDay = id;
            updateUI();
        };

        // Form Handling
        document.getElementById('addAppointmentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('clientName').value;
            const phone = document.getElementById('clientPhone').value;
            const time = document.getElementById('appointmentTime').value;
            const barber = document.getElementById('appointmentBarber').value;
            const serviceStr = document.getElementById('appointmentService').value;
            
            let price = 50, duration = 30;
            if (serviceStr.includes('זקן')) { price = 150; duration = 45; }
            if (serviceStr.includes('צבע')) { price = 200; duration = 40; }

            const newApp = {
                id: Date.now(),
                time: time,
                type: 'appointment',
                service: `${serviceStr} - ${name}`,
                barber: barber,
                status: 'waiting',
                statusText: 'חדש',
                price: price,
                duration: duration,
                phone: phone,
                tint: 'info',
                nodeColor: 'bg-info/50',
                borderColor: 'border-info/20'
            };

            if (!state.appointments[state.selectedDay]) {
                state.appointments[state.selectedDay] = [];
            }
            
            // Insert and sort by time
            state.appointments[state.selectedDay].push(newApp);
            state.appointments[state.selectedDay].sort((a, b) => a.time.localeCompare(b.time));
            
            document.getElementById('addAppointmentModal').classList.add('hidden');
            e.target.reset();
            updateUI();
        });

        // Init
        updateUI();
    })();
</script>
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-2 pointer-events-none" id="toast-container"></div></body></html>
