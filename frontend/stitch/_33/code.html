<!DOCTYPE html><html class="dark" dir="rtl" lang="he"><head>

<style>
        .gold-glow-shadow {
            filter: drop-shadow(0 0 8px rgba(239, 178, 0, 0.15));
        }
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center antialiased pb-32">
<!-- Mobile Container Wrapper -->
<div class="w-full max-w-[430px] mx-auto px-gutter flex flex-col min-h-screen">
<!-- TopAppBar (From Shared JSON) -->
<header class="bg-surface border-b border-border-light flex items-center justify-between px-5 h-16 w-full z-50 fixed top-0 left-0 max-w-[430px] mx-auto left-1/2 -translate-x-1/2">
<button class="text-primary transition-all duration-200 active:scale-95 flex items-center justify-center p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary font-black">Barber Onboarding</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Area -->
<main class="flex-grow pt-24 pb-section-gap flex flex-col gap-section-gap">
<!-- Progress Bar -->
<div class="w-full flex justify-between gap-2 px-2">
<div class="h-1 flex-1 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-full"></div>
</div>
<div class="h-1 flex-1 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-full"></div>
</div>
<div class="h-1 flex-1 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-full"></div>
</div>
<div class="h-1 flex-1 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-full"></div>
</div>
<div class="h-1 flex-1 bg-surface-container rounded-full overflow-hidden relative">
<div class="h-full bg-primary-container w-1/2 relative z-10"></div>
<div class="absolute inset-0 bg-primary-container/20 animate-pulse"></div>
</div>
</div>
<!-- Header Section -->
<section class="flex flex-col gap-stack-sm text-center">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-text-primary">סנכרון תורים ונתונים</h2>
<p class="font-body-md text-body-md text-text-secondary max-w-[300px] mx-auto">
                    חבר את המערכת הקיימת שלך כדי לסנכרן תורים, לקוחות וזמינות באופן אוטומטי.
                </p>
</section>
<!-- Connection Options Grid -->
<section class="flex flex-col gap-stack-md">
<!-- Option 1: Website (Active/Selected State Example) -->
<button class="w-full bg-surface-2 border border-primary-container rounded-xl p-stack-md flex items-center justify-between transition-all active:scale-95 gold-glow-shadow relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-r from-primary-container/10 to-transparent opacity-50"></div>
<div class="flex items-center gap-stack-md relative z-10">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center border border-primary-container/30">
<span class="material-symbols-outlined text-primary-container">language</span>
</div>
<div class="text-right">
<h3 class="font-body-lg text-body-lg text-text-primary">חיבור לאתר המספרה</h3>
<p class="font-body-md text-body-md text-text-muted text-sm">סנכרון אוטומטי מ-API</p>
</div>
</div>
<div class="relative z-10">
<span class="material-symbols-outlined text-primary-container">radio_button_checked</span>
</div>
</button>
<!-- Option 2: Google Calendar -->
<button class="w-full bg-surface-1 border border-border-light rounded-xl p-stack-md flex items-center justify-between transition-all active:scale-95 hover:bg-surface-2 group">
<div class="flex items-center gap-stack-md">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center group-hover:border-border-light border border-transparent transition-colors">
<span class="material-symbols-outlined text-text-secondary">calendar_month</span>
</div>
<div class="text-right">
<h3 class="font-body-lg text-body-lg text-text-primary">סנכרון עם Google Calendar</h3>
<p class="font-body-md text-body-md text-text-muted text-sm">ניהול יומן פשוט</p>
</div>
</div>
<div>
<span class="material-symbols-outlined text-text-secondary">radio_button_unchecked</span>
</div>
</button>
<!-- Option 3: External System -->
<button class="w-full bg-surface-1 border border-border-light rounded-xl p-stack-md flex items-center justify-between transition-all active:scale-95 hover:bg-surface-2 group">
<div class="flex items-center gap-stack-md">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center group-hover:border-border-light border border-transparent transition-colors">
<span class="material-symbols-outlined text-text-secondary">account_tree</span>
</div>
<div class="text-right">
<h3 class="font-body-lg text-body-lg text-text-primary">ייבוא ממערכת ניהול חיצונית</h3>
<p class="font-body-md text-body-md text-text-muted text-sm">Fresha, Booksy, וכו׳</p>
</div>
</div>
<div>
<span class="material-symbols-outlined text-text-secondary">radio_button_unchecked</span>
</div>
</button>
</section>
<!-- Input Field Area -->
<section class="flex flex-col gap-stack-sm">
<label class="font-body-lg text-body-lg text-text-primary">קישור לאתר או API Key</label>
<div class="relative">
<input class="w-full bg-surface-1 border border-border-light rounded-2xl py-4 px-4 text-text-primary placeholder:text-text-muted focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all dir-ltr text-left font-label-mono" placeholder="https://your-barbershop.com/api או מפתח..." type="text">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-text-muted">link</span>
</div>
</section>
<!-- Info Badge -->
<section class="bg-surface-container-low border border-border-light rounded-lg p-4 flex items-start gap-3">
<span class="material-symbols-outlined text-success mt-0.5" style="font-variation-settings: 'FILL' 1;">lock</span>
<p class="font-body-md text-body-md text-text-secondary text-sm">
                    הנתונים שלך מאובטחים ומסונכרנים בזמן אמת. המערכת משתמשת בהצפנת קצה לקצה.
                </p>
</section>
</main>
<!-- Sticky Bottom CTA (Suppressed BottomNavBar for linear flow) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container/80 backdrop-blur-xl border-t border-border-light p-5 z-40 flex justify-center">
<div class="w-full max-w-[430px]">
<button class="w-full bg-text-primary text-background font-headline-sm text-headline-sm py-4 rounded-xl transition-transform active:scale-95 font-bold shadow-lg hover:bg-secondary-fixed">
                    המשך</button>
</div>
</div>
</div>
