<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.text-primary');
        }
        
        /* Custom Input Styling */
        .form-input {
            background-color: theme('colors.surface-1');
            border: 1px solid theme('colors.border-light');
            color: theme('colors.text-primary');
            border-radius: theme('borderRadius.lg');
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 1px theme('colors.primary'), 0 0 15px theme('colors.gold-glow');
        }
        
        .form-input::placeholder {
            color: theme('colors.text-muted');
        }

        /* Floating Label Logic */
        .input-group {
            position: relative;
            margin-bottom: theme('spacing.stack-lg');
        }

        .input-group label {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: theme('colors.text-muted');
            pointer-events: none;
            transition: all 0.2s ease-out;
            font-family: theme('fontFamily.body-md');
            font-size: theme('fontSize.body-md')[0];
        }

        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label {
            top: 0;
            transform: translateY(-50%) scale(0.85);
            right: 12px;
            background-color: theme('colors.background'); /* Adjust if inside a card */
            padding: 0 4px;
            color: theme('colors.primary');
        }
        
        .input-group input:not(:focus):not(:placeholder-shown) ~ label {
             color: theme('colors.text-muted');
        }
    </style>
<style>
    body {

<body class="min-h-screen flex flex-col items-center pb-safe" style="background-color: rgb(9, 9, 11);">
<!-- Mobile Container constraint -->
<main class="w-full max-w-[430px] flex-1 flex flex-col relative px-gutter pt-8">
<!-- Header: Transactional/Task-Focused so no global nav, just a back action -->
<header class="flex flex-row justify-between items-center w-full mb-section-gap h-16">
<button aria-label="חזור" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-1 border border-border-light text-text-primary hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="text-primary font-headline-md text-headline-md text-center flex-1" style="color: rgb(239, 178, 0);">
                Tor-LI</div>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<!-- Content Canvas -->
<section class="flex-1 flex flex-col mt-4">
<div class="mb-section-gap text-right"><h1 class="font-headline-lg-mobile text-headline-lg-mobile text-text-primary mb-stack-sm tracking-tight" style="color: rgb(250, 250, 249);">נעים להכיר</h1><p class="font-body-md text-body-md text-text-secondary" style="color: rgb(161, 161, 170);">ספר לנו קצת עליך כדי שנוכל להתאים לך את התספורת הבאה.</p></div>
<form class="flex-1 flex flex-col">
<!-- Full Name -->
<div class="relative mb-stack-lg"><input class="w-full h-14 px-4 bg-surface-2 border border-border-light rounded-[20px] text-text-primary font-body-md text-right focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all peer" id="fullName" name="fullName" placeholder=" " required="" type="text" style="background-color: rgb(16, 16, 18); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08);"><label class="absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary pointer-events-none transition-all duration-200 font-body-md peer-focus:top-0 peer-focus:scale-85 peer-focus:right-2 peer-focus:bg-background peer-focus:px-1 peer-focus:text-primary peer-not-placeholder-shown:top-0 peer-not-placeholder-shown:scale-85 peer-not-placeholder-shown:right-2 peer-not-placeholder-shown:bg-background peer-not-placeholder-shown:px-1" for="fullName">שם מלא</label></div>
<!-- Phone Number with Prefix -->

<span class="font-label-mono text-label-mono text-text-primary" dir="ltr">+972</span>
</div>

<label class="absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary pointer-events-none transition-all duration-200 font-body-md peer-focus:top-0 peer-focus:scale-85 peer-focus:right-2 peer-focus:bg-background peer-focus:px-1 peer-focus:text-primary peer-not-placeholder-shown:top-0 peer-not-placeholder-shown:scale-85 peer-not-placeholder-shown:right-2 peer-not-placeholder-shown:bg-background peer-not-placeholder-shown:px-1" for="phoneNumber">

</div>

<div class="flex justify-center items-center gap-2 mt-6">
<div class="w-8 h-1 bg-primary rounded-full"></div>

<div class="w-2 h-1 bg-surface-variant rounded-full"></div>
</div>
</div>
</form>

</main>
<script>
        // Simple script to handle input placeholder polyfill for the floating labels if needed, 
        // though standard CSS :placeholder-shown handles most of it.
        document.querySelectorAll('.form-input, input[type="tel"]').forEach(input => {
            // Force evaluation of state on load
            if(input.value) {
                input.classList.remove('placeholder-shown');
            }
            
            input.addEventListener('input', function() {
                if(this.value) {
                    this.setAttribute('value', this.value);
                }
            });
        });
    </script>
