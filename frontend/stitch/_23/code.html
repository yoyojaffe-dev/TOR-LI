<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('dashboardData', () => ({
            staff: 'all',
            period: '1M',
            get currentData() {
                let baseRev = 3390;
                let baseVis = 36;
                let comp = 64;
                let upc = 17;
                let wait = 19;
                let abd = 12;
                let newC = 8;
                
                let pMult = 1;
                if (this.period === '3M') pMult = 2.8;
                if (this.period === '6M') pMult = 5.5;
                if (this.period === '1Y') pMult = 11.2;
                if (this.period === 'All') pMult = 25.4;
                
                let sMult = 1;
                if (this.staff === 'yosi') { sMult = 0.3; comp = 70; upc=10; wait=20; }
                if (this.staff === 'shai') { sMult = 0.25; comp = 60; upc=20; wait=20; }
                if (this.staff === 'uri') { sMult = 0.2; comp = 65; upc=15; wait=20; }
                if (this.staff === 'or') { sMult = 0.25; comp = 55; upc=25; wait=20; }
                
                let rev = Math.round(baseRev * pMult * sMult);
                let vis = Math.round(baseVis * pMult * sMult);
                let a = Math.round(abd * pMult * sMult);
                let n = Math.round(newC * pMult * sMult);
                
                const revPaths = [
                    'M0,80 L30,40 L60,20 L100,45 L130,50 L160,85 L200,40 L230,30 L250,20 L280,45 L300,70 L330,80 L350,75 L380,25 L400,25',
                    'M0,70 L40,30 L80,50 L120,20 L160,60 L200,40 L240,80 L280,30 L320,50 L360,20 L400,10',
                    'M0,90 L50,70 L100,80 L150,40 L200,60 L250,30 L300,50 L350,20 L400,40',
                    'M0,60 L60,40 L120,70 L180,30 L240,50 L300,20 L360,45 L400,15'
                ];
                const visPaths = [
                    'M0,80 L380,80 L395,20 L400,20',
                    'M0,90 L100,80 L200,60 L300,40 L400,20',
                    'M0,50 L100,60 L200,40 L300,30 L400,10',
                    'M0,70 L150,50 L250,80 L350,30 L400,25'
                ];
                
                let pathIdx = (this.staff.length + this.period.length) % 4;
                
                return {
                    revenue: rev.toLocaleString('en-US'),
                    visits: vis,
                    completed: comp,
                    upcoming: upc,
                    waiting: wait,
                    abandoned: a,
                    newCustomers: n,
                    revPath: revPaths[pathIdx],
                    visPath: visPaths[pathIdx]
                }
            }
        }))
    })
</script>
