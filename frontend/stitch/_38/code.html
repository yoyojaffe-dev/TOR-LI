<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 4px;

            background: rgba(19, 18, 20, 0.7);
            backdrop-filter: blur(20px);

        }
        
        /* Gold glow utility */

            box-shadow: 0 0 15px rgba(239, 178, 0, 0.15);
        }

        .pb-safe {

        .toggle-checkbox:checked {
            right: 0;
            border-color: #ffd174;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #efb200;
        }
        .toggle-checkbox {
            right: 0;
            z-index: 1;
            border-color: #e2e2e2;
            transition: all 0.3s;
        }
        .toggle-label {
            width: 3rem;
            height: 1.5rem;
            background-color: #353437;
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }
        .toggle-label::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 1.25rem;
            height: 1.25rem;
            background-color: white;
            border-radius: 50%;
            transition: all 0.3s;
        }
        .toggle-checkbox:checked + .toggle-label::after {

<!-- Staff List Container (Surface 1 / Glass Panel) -->
<div class="bg-surface-1 border border-border-light rounded-xl overflow-hidden flex flex-col">
<template :key="staff.id" x-for="staff in staffMembers">
<div :class="{ 'opacity-60': !staff.active }" class="p-4 border-b border-border-light flex flex-col gap-3 hover:bg-white/5 transition-colors group">
<!-- View Mode -->
<div class="flex items-center justify-between w-full" x-show="!staff.isEditing">
<div class="flex items-center gap-4">
<div :class="{ 'border-primary glow-active': staff.active, 'border-border-light': !staff.active }" class="w-12 h-12 rounded-full overflow-hidden border-2 relative transition-all duration-300">
<template x-if="staff.image">
<img :alt="staff.name + ' Avatar'" :class="{ 'group-hover:grayscale-0': staff.active }" :src="staff.image" class="w-full h-full object-cover grayscale transition-all duration-300"/>
</template>
<template x-if="!staff.image">
<div class="w-full h-full bg-surface-3 flex items-center justify-center">
<span class="material-symbols-outlined text-text-muted text-[24px]">person</span>
</div>
</template>
</div>
<div>
<h3 class="text-body-lg font-body-lg text-text-primary" x-text="staff.name"></h3>
<p class="text-label-mono font-label-mono text-text-muted" x-text="staff.role"></p>
</div>
</div>
<div class="flex items-center gap-3">
<div class="relative inline-block w-12 mr-2 align-middle select-none">

<label :for="'toggle' + staff.id" class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-variant cursor-pointer"></label>
</div>
<button @click="startEdit(staff)" class="w-8 h-8 rounded-full bg-surface-2 border border-border-light flex items-center justify-center text-text-muted hover:text-primary hover:border-primary/50 transition-colors">
<span class="material-symbols-outlined text-[18px]">edit</span>
</button>
<button @click="confirmDelete(staff)" class="w-8 h-8 rounded-full bg-surface-2 border border-border-light flex items-center justify-center text-text-muted hover:text-error hover:bg-error/10 hover:border-error/30 transition-colors">
<span class="material-symbols-outlined text-[18px]">delete</span>
</button>
</div>

<button @click="saveEdit(staff)" class="px-4 py-1.5 rounded-full bg-primary text-on-primary hover:bg-primary/90 transition-colors text-sm font-medium">שמור</button>
</div>
</div>
</div>

<div>

            showAddModal: false,
            staffToDelete: null,
            newStaff: { name: '', role: '', active: true },
            editForm: { name: '', role: '' },
            
            startEdit(staff) {
                this.editForm = { name: staff.name, role: staff.role };
                staff.isEditing = true;
            },
            
            saveEdit(staff) {
                if (this.editForm.name.trim() !== '') {
                    staff.name = this.editForm.name;
                    staff.role = this.editForm.role;
                }
                staff.isEditing = false;
            },
            
            cancelEdit(staff) {
                staff.isEditing = false;
            },
            
            confirmDelete(staff) {
                this.staffToDelete = staff;
            },
            
            deleteStaff() {
                if (this.staffToDelete) {
                    this.staffMembers = this.staffMembers.filter(s => s.id !== this.staffToDelete.id);
                    this.staffToDelete = null;
                }
            },
            
            addStaff() {
                if (this.newStaff.name.trim() !== '') {
                    const newId = Math.max(...this.staffMembers.map(s => s.id)) + 1;
                    this.staffMembers.push({
                        id: newId,
                        name: this.newStaff.name,
                        role: this.newStaff.role || 'עובד',
                        active: this.newStaff.active,
                        image: null,
                        isEditing: false
                    });
                    this.showAddModal = false;
                    this.newStaff = { name: '', role: '', active: true };
                }
            }
        }
    }
</script>
</body></html>
