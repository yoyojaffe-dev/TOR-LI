<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Tor-li — Find a Haircut Now</title>
    <!--
      PLACEHOLDER SHELL. The real UI is generated in Stitch ("TOR LI" project).
      Paste the Stitch <head> (styles) and <body> markup here, KEEPING these hook
      ids/attributes so js/app.js can drive the design:
        #map  #barbershop-list  #slot-list  #lock-timer  #booking-form (name, phone)
    -->
  </head>
  <body>
    <main>
      <p id="geo-banner" hidden style="background:#fff3cd;padding:8px;margin:0">
        Location unavailable — showing results near Tel Aviv city centre.
      </p>
      <section id="map" style="height: 240px"></section>
      <ul id="barbershop-list"></ul>
      <ul id="slot-list"></ul>
      <div id="lock-timer"></div>
      <form id="booking-form" hidden>
        <input name="name" placeholder="Name" required />
        <input name="phone" placeholder="Phone" required />
        <button type="submit">Confirm booking</button>
      </form>
    </main>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
